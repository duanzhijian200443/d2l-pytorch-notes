name: Update dropout study log

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  update-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update study log
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("study_log.md")
          text = path.read_text(encoding="utf-8")

          text = text.replace(
              "- **最近更新时间**: 2026-07-19",
              "- **最近更新时间**: 2026-07-20",
              1,
          )
          text = text.replace(
              "- **当前学习章节**: 4.5 权重衰减（已完成）",
              "- **当前学习章节**: 4.6 暂退法（Dropout，已完成）",
              1,
          )

          concepts_marker = "- **核心掌握概念**:\n"
          new_concepts = (
              "  - Inverted Dropout：使用伯努利随机掩码丢弃隐藏层激活，并除以 $1-p$ 保持输出期望不变\n"
              "  - 训练与评估状态边界：`net.train()` 启用 Dropout，`net.eval()` 关闭 Dropout，`torch.no_grad()` 仅关闭梯度记录\n"
          )
          if "Inverted Dropout：使用伯努利随机掩码" not in text:
              text = text.replace(concepts_marker, concepts_marker + new_concepts, 1)

          checklist_anchor = "- [x] 4.1 多层感知机\n"
          checklist_items = (
              "- [x] 4.2 多层感知机的从零开始实现\n"
              "- [x] 4.3 多层感知机的简洁实现\n"
              "- [x] 4.4 模型选择、欠拟合和过拟合\n"
              "- [x] 4.5 权重衰减\n"
              "- [x] 4.6 暂退法（Dropout）\n"
          )
          if "- [x] 4.6 暂退法（Dropout）" not in text:
              text = text.replace(checklist_anchor, checklist_anchor + checklist_items, 1)

          log_block = r'''
### [工单-169] ❓ Inverted Dropout 为什么要除以 $1-p$？
- **核心疑问**: 随机掩码已经完成了元素丢弃，为什么保留下来的激活还需要缩放？
- **底层解释**: 若只计算 $M\odot X$，单个元素的期望会变为 $(1-p)x$，训练阶段的激活尺度会系统性缩小。Inverted Dropout 使用 $\frac{M\odot X}{1-p}$，使 $E[x']=p\cdot0+(1-p)\frac{x}{1-p}=x$，从而让训练与评估阶段保持一致的期望尺度。

### [工单-170] 🪤 混淆 Dropout 的丢弃对象与概率含义
- **错误直觉**: 把 `dropout=0.3` 理解为固定丢弃 30 个单元，或认为 Dropout 会随机删除隐藏层参数。
- **认知盲区**: `dropout` 表示每个激活元素独立被置零的概率；实际丢弃数量每次随机波动。权重和偏置始终保留，只是被掩码置零的激活路径在本轮不产生梯度贡献。
- **纠偏锚点**: Dropout 随机置零的是隐藏层激活值，不是模型参数；$p$ 是逐元素丢弃概率，不是固定数量。

### [工单-171] ❓ `torch.rand_like`、`torch.randn_like` 与设备一致性
- **核心疑问**: 为什么实现 Dropout 应使用 `torch.rand_like(X)`，而不是 `torch.randn_like(X)`？
- **底层解释**: `torch.rand_like(X)` 生成 $[0,1)$ 上的均匀分布随机数，因此阈值比较 `rand > p` 的保留概率恰为 $1-p$；`randn_like` 生成标准正态分布，阈值概率不等于指定的 Dropout 概率。`rand_like` 还会继承 `X` 的 Shape、dtype 和 device，避免 CPU 掩码与 CUDA 张量相乘时出现设备不一致。

### [工单-172] ❓ `net.eval()` 与 `torch.no_grad()` 的职责边界
- **核心疑问**: 两者是否都会关闭 Dropout 和计算图？
- **底层解释**: `net.eval()` 切换模块的训练/评估行为，关闭 Dropout，并让 BatchNorm 使用运行统计量；`torch.no_grad()` 只停止自动微分记录，不会改变模块状态。评估阶段通常同时使用二者。

### [工单-173] 🪤 认为 Dropout 必须位于 ReLU 之后
- **错误直觉**: 认为激活函数先“激活隐藏层”，Dropout 才能对隐藏层生效，因此 `Dropout -> ReLU` 不合法。
- **认知盲区**: Dropout 可以作用于任意中间张量。对 ReLU 而言，由于其满足正齐次性 $\operatorname{ReLU}(az)=a\operatorname{ReLU}(z), a\ge0$，在使用同一掩码时，Dropout 放在 ReLU 前后数学结果相同；但对 Sigmoid、Tanh、GELU 等函数通常不等价。
- **纠偏锚点**: `Linear -> ReLU -> Dropout` 是常见表达，不是所有激活函数下都必须遵守的数学定律。

### [工单-174] ❓ 隐藏层、线性层与激活函数是什么关系？
- **核心疑问**: 激活函数是否负责“激活隐藏层”？
- **底层解释**: 隐藏层通常由线性变换和非线性激活共同构成：$Z=XW+b$ 是预激活值，$H=\sigma(Z)$ 是传给下一层的隐藏表示。`nn.Linear` 决定可学习映射和输出维度，激活函数逐元素引入非线性且通常不改变 Shape。若连续层之间没有非线性，多层仿射变换仍可合并为一个仿射变换。

'''

          api_marker = "## 🔧 API 速查表 (API Cheatsheet)"
          if "### [工单-169]" not in text:
              text = text.replace(api_marker, log_block + api_marker, 1)

          path.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/update-dropout-study-log.yml")
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit updated log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: 记录暂退法学习日志并更新章节进度"
          git push origin main
